<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pc-waker</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <h1>💤 pc-waker</h1>
    {{if .Message}}
    <div class="banner {{if .IsError}}err{{else}}ok{{end}}">{{.Message}}</div>
    {{end}} {{if .Hosts}}
    <ul>
      {{range $i, $h := .Hosts}}
      <li>
        <span
          ><span class="name">{{$h.Name}}</span><br /><span class="mac"
            >{{$h.MAC}}</span
          ></span
        >
        <form method="post" action="/wake">
          <input type="hidden" name="host" value="{{$i}}" />
          <button type="submit">Wake</button>
        </form>
      </li>
      {{end}}
    </ul>
    {{else}}
    <p class="empty">
      No hosts configured. Add some to your config.yaml and restart.
    </p>
    {{end}}
  </body>
</html>
